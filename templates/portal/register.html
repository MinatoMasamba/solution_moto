{% extends "base.html" %}
{% load static %}

{% block title %}Inscription — Go-Mboka{% endblock %}

{% block content %}
<section class="container mx-auto px-4 py-16 max-w-md">
  <h1 class="text-3xl font-bold tracking-tight text-center">Créer un compte</h1>
  <p class="mt-2 text-sm text-gray-600 text-center">
    Déjà inscrit ? <a href="{% url 'portal:login' %}" class="text-emerald-600 hover:underline">Connectez-vous</a>.
  </p>

  <form id="register-form" class="mt-8 space-y-4 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    <div>
      <label for="phone_number" class="block text-sm font-medium text-gray-700">Numéro de téléphone</label>
      <input type="tel" id="phone_number" name="phone_number" required
        placeholder="0812345678"
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="first_name" class="block text-sm font-medium text-gray-700">Prénom</label>
        <input type="text" id="first_name" name="first_name"
          class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
      </div>
      <div>
        <label for="last_name" class="block text-sm font-medium text-gray-700">Nom</label>
        <input type="text" id="last_name" name="last_name"
          class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
      </div>
    </div>

    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email <span class="text-gray-400">(optionnel)</span></label>
      <input type="email" id="email" name="email"
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
    </div>

    <div>
      <label for="role" class="block text-sm font-medium text-gray-700">Je suis…</label>
      <select id="role" name="role" required
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
        <option value="client">Client</option>
        <option value="motard">Motard</option>
        <option value="owner">Propriétaire de motos</option>
        <option value="fleet_manager">Gérant de flotte</option>
      </select>
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
      <input type="password" id="password" name="password" required minlength="8"
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
      <p class="mt-1 text-xs text-gray-400">8 caractères minimum.</p>
    </div>

    <p id="register-error" class="hidden text-sm text-red-600"></p>

    <button type="submit"
      class="w-full rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">
      Créer mon compte
    </button>
  </form>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}" defer></script>
{% endblock %}
