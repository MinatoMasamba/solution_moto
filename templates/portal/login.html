{% extends "base.html" %}
{% load static %}

{% block title %}Connexion — Go-Mboka{% endblock %}

{% block content %}
<section class="container mx-auto px-4 py-16 max-w-md">
  <h1 class="text-3xl font-bold tracking-tight text-center">Connexion</h1>
  <p class="mt-2 text-sm text-gray-600 text-center">
    Pas encore de compte ? <a href="{% url 'portal:register' %}" class="text-emerald-600 hover:underline">Inscrivez-vous</a>.
  </p>

  <form id="login-form" class="mt-8 space-y-4 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
    <div>
      <label for="phone_number" class="block text-sm font-medium text-gray-700">Numéro de téléphone</label>
      <input type="tel" id="phone_number" name="phone_number" required
        placeholder="0812345678"
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
      <input type="password" id="password" name="password" required
        class="mt-1 w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
    </div>

    <p id="login-error" class="hidden text-sm text-red-600"></p>

    <button type="submit"
      class="w-full rounded-md bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">
      Se connecter
    </button>
  </form>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}" defer></script>
{% endblock %}
