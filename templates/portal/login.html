<!DOCTYPE html>
<html>
<head>
    <title>Connexion Client - GO-MBOKA</title>
    <link rel="stylesheet" href="/static/vendor/tailwindcss.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6">Connexion Client</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700">Téléphone</label>
                <input type="text" name="username" class="w-full border p-2 rounded">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Mot de passe</label>
                <input type="password" name="password" class="w-full border p-2 rounded">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Se connecter</button>
        </form>
    </div>
</body>
</html>
