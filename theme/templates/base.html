{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Go-Mboka{% endblock %}</title>
    {% tailwind_css %}
  </head>

  <body class="bg-gray-50 text-gray-900 antialiased">
    <header class="bg-white border-b border-gray-200">
      <nav class="container mx-auto flex items-center justify-between px-4 py-4">
        <a href="{% url 'portal:home' %}" class="text-xl font-bold text-emerald-600">Go-Mboka</a>
        <div class="flex items-center gap-4">
          <a href="{% url 'portal:login' %}" class="text-sm text-gray-500 hover:text-emerald-600">Connexion</a>
          <a href="{% url 'portal:register' %}" class="text-sm font-medium text-emerald-600 hover:text-emerald-700">Inscription</a>
          <a href="{% url 'admin:index' %}" class="text-sm text-gray-500 hover:text-emerald-600">Administration</a>
        </div>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="container mx-auto px-4 py-8 text-sm text-gray-400">
      &copy; {% now "Y" %} Go-Mboka — Kinshasa, RDC
    </footer>

    <script src="{% static 'js/main.js' %}" defer></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
